<!DOCTYPE html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Dietas iPad V5</title><style>
body{font-family:Arial,sans-serif;background:#f4f4f4;margin:10px} .card{background:#fff;border-radius:12px;padding:12px;margin-bottom:12px} .nav{display:flex;justify-content:center;gap:10px;align-items:center;font-size:24px;font-weight:bold}.btn{padding:4px 10px}.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}.h{background:#e8e8e8;padding:8px;text-align:center;font-weight:bold}.d{padding:10px;text-align:center;border:1px solid #ccc;border-radius:8px}.lb{background:#dff0d8}.wk{background:#c8f0c8;color:#006400}.nat{background:#ffcaca;color:#8b0000}.loc{background:#cfe8ff;color:#003c8f}.vac{background:#e3ccff;color:#6a0dad}.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none}.box{background:#fff;width:320px;margin:100px auto;padding:15px;border-radius:12px}.box button{width:100%;margin:4px 0;padding:10px}</style></head><body>
<div class='card'>
<div class='nav'><button class='btn' onclick='chgY(-1)'>◀</button><span id='yr'></span><button class='btn' onclick='chgY(1)'>▶</button> ⚙️ <button onclick='cfg()'>Config</button></div>
<div class='nav'><button class='btn' onclick='chgM(-1)'>◀</button><span id='mn'></span><button class='btn' onclick='chgM(1)'>▶</button></div>
</div>
<div class='card'><div id='cal' class='grid'></div></div>
<div class='card'><h3>Resumen mensual</h3><div id='res'></div></div>
<div id='m' class='modal'><div class='box'><div id='fd'></div><button onclick="setS('work')">✅ Trabajo</button><button onclick="setS('vac')">🏖 Vacaciones</button><button onclick="setS('local')">🟦 Festivo local</button><button onclick="setS('clear')">❌ Borrar</button><button onclick='closeM()'>Cerrar</button></div></div>
<script>
let year=2026,month=new Date().getMonth();
let db=JSON.parse(localStorage.getItem('dietasv5')||'{"work":{},"vac":{},"local":{},"cfg":{"dieta":35,"plus":100}}');
let cur='';
function save(){localStorage.setItem('dietasv5',JSON.stringify(db));}
function cfg(){let d=prompt('Importe dieta',db.cfg.dieta);let p=prompt('Plus finde/festivo',db.cfg.plus);if(d)db.cfg.dieta=+d;if(p)db.cfg.plus=+p;save();draw();}
function chgY(n){year+=n;draw()} function chgM(n){month+=n;if(month<0){month=11;year--} if(month>11){month=0;year++} draw()}
function openM(k){cur=k;fd.innerHTML='<b>'+k+'</b>';m.style.display='block'} function closeM(){m.style.display='none'}
function setS(t){if(t==='work'){db.work[cur]=1;delete db.vac[cur]} if(t==='vac'){db.vac[cur]=1;delete db.work[cur]} if(t==='local'){db.local[cur]=1} if(t==='clear'){delete db.work[cur];delete db.vac[cur];delete db.local[cur]} save();closeM();draw()}
function draw(){yr.textContent=year;mn.textContent=new Date(year,month,1).toLocaleString('es',{month:'long'}).toUpperCase();cal.innerHTML='';['L','M','X','J','V','S','D'].forEach(x=>{let h=document.createElement('div');h.className='h';h.textContent=x;cal.appendChild(h)});
let off=(new Date(year,month,1).getDay()+6)%7;for(let i=0;i<off;i++)cal.appendChild(document.createElement('div'));
let nat=[`${year}-01-01`,`${year}-01-06`,`${year}-05-01`,`${year}-08-15`,`${year}-10-12`,`${year}-12-06`,`${year}-12-08`,`${year}-12-25`];
let L=0,W=0,N=0,F=0,V=0,totalDietas=0,totalPlus=0;
for(let d=1;d<=new Date(year,month+1,0).getDate();d++){let k=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;let wd=new Date(year,month,d).getDay();let e=document.createElement('div');e.className='d';let t=''+d;
if(db.vac[k]){e.classList.add('vac');t+=' 🏖';V++;}
else if(db.work[k]){totalDietas+=db.cfg.dieta;
if(nat.includes(k)){e.classList.add('nat');t+=' ✅✅';N++;totalPlus+=db.cfg.plus;}
else if(db.local[k]){e.classList.add('loc');t+=' ✅✅';F++;totalPlus+=db.cfg.plus;}
else if(wd===0||wd===6){e.classList.add('wk');t+=' ✅✅';W++;totalPlus+=db.cfg.plus;}
else {e.classList.add('lb');t+=' ✅';L++;}}
else if(nat.includes(k)){e.classList.add('nat');t+=' 🎉';}
else if(db.local[k]){e.classList.add('loc');t+=' 🎉';}
 e.textContent=t;e.onclick=()=>openM(k);cal.appendChild(e)}
res.innerHTML=`Laborables: ${L}<br>Fin de semana: ${W}<br>Festivos nacionales: ${N}<br>Festivos locales: ${F}<br>Vacaciones: ${V}<hr>Dietas: ${totalDietas} €<br>Plus: ${totalPlus} €<br><b>TOTAL MES: ${totalDietas+totalPlus} €</b><hr>Dieta configurada: ${db.cfg.dieta} € | Plus configurado: ${db.cfg.plus} €`;}
draw();
</script></body></html>
