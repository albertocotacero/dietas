<!DOCTYPE html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Dietas V4</title><style>
body{font-family:Arial;margin:10px;background:#f3f3f3}h1{margin:0 0 10px}.month{background:#fff;padding:10px;border-radius:12px;margin:10px 0}.bar{display:flex;justify-content:space-between}.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}.hd,.day{padding:8px;text-align:center;border-radius:6px}.hd{background:#e8e8e8;font-weight:bold}.day{border:1px solid #ccc}.wk{background:#c8f0c8;color:#006400}.lb{background:#dff0d8;color:#006400}.nat{background:#ffcaca;color:#8b0000}.loc{background:#cfe8ff;color:#003c8f}.vac{background:#e3ccff;color:#6a0dad}.modal{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none}.box{background:#fff;margin:120px auto;padding:15px;width:320px;border-radius:12px}.box button{width:100%;padding:12px;margin:4px 0}.sum{font-size:12px;font-weight:bold;margin-top:8px}</style></head><body>
<h1>Dietas iPad V4</h1><div id="app"></div><h2 id="annual"></h2>
<div id="m" class="modal"><div class="box"><div id="fd"></div><button onclick="act('work')">✅ Trabajo</button><button onclick="act('vac')">🏖 Vacaciones</button><button onclick="act('local')">🟦 Festivo local</button><button onclick="act('clear')">❌ Borrar</button><button onclick="closeM()">Cancelar</button></div></div>
<script>
const nat=['2026-01-01','2026-01-06','2026-05-01','2026-08-15','2026-10-12','2026-12-06','2026-12-08','2026-12-25'];
let db=JSON.parse(localStorage.getItem('dietasv4')||'{"work":{},"vac":{},"local":{}}'); let cur='';
function save(){localStorage.setItem('dietasv4',JSON.stringify(db));}
function openM(k){cur=k;fd.innerHTML='<b>'+k+'</b>';m.style.display='block';}
function closeM(){m.style.display='none';}
function act(t){if(t==='work'){db.work[cur]=1;delete db.vac[cur];}
if(t==='vac'){db.vac[cur]=1;delete db.work[cur];}
if(t==='local'){db.local[cur]=1;}
if(t==='clear'){delete db.work[cur];delete db.vac[cur];delete db.local[cur];}
save();closeM();draw();}
function draw(){let app=document.getElementById('app');app.innerHTML='';let TL=0,TW=0,TN=0,TF=0,TV=0,TOT=0;
for(let mth=0;mth<12;mth++){
let box=document.createElement('div');box.className='month';box.innerHTML='<div class="bar"><b>'+new Date(2026,mth,1).toLocaleString('es',{month:'long'}).toUpperCase()+'</b></div><div class="grid"></div><div class="sum"></div>';let g=box.querySelector('.grid');['L','M','X','J','V','S','D'].forEach(x=>{let h=document.createElement('div');h.className='hd';h.textContent=x;g.appendChild(h);});let off=(new Date(2026,mth,1).getDay()+6)%7;for(let i=0;i<off;i++)g.appendChild(document.createElement('div'));let ml=0,mw=0,mn=0,mf=0,mv=0;
for(let d=1;d<=new Date(2026,mth+1,0).getDate();d++){
let k='2026-'+String(mth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');let w=new Date(2026,mth,d).getDay();let e=document.createElement('div');e.className='day';let t=''+d;
if(db.vac[k]){e.classList.add('vac');t+=' 🏖';mv++;TV++;}
else if(db.work[k]){
if(nat.indexOf(k)>=0){e.classList.add('nat');t+=' ✅✅';mn++;TN++;TOT+=135;}
else if(db.local[k]){e.classList.add('loc');t+=' ✅✅';mf++;TF++;TOT+=135;}
else if(w===0||w===6){e.classList.add('wk');t+=' ✅✅';mw++;TW++;TOT+=135;}
else {e.classList.add('lb');t+=' ✅';ml++;TL++;TOT+=35;}}
else if(nat.indexOf(k)>=0){e.classList.add('nat');t+=' 🎉';}
else if(db.local[k]){e.classList.add('loc');t+=' 🎉';}
 e.textContent=t;e.ontouchstart=e.onclick=function(){openM(k);};g.appendChild(e);
}
box.querySelector('.sum').innerHTML='Laborables:'+ml+' | Fin semana:'+mw+' | Festivos nac:'+mn+' | Festivos loc:'+mf+' | Vacaciones:'+mv;app.appendChild(box);
}
annual.innerHTML='Total anual: '+TOT+' €';}
draw();
</script></body></html>
