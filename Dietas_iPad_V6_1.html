<!DOCTYPE html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Cota Cero Galicia - Dietas V6.1</title><style>
:root{--navy:#102D52;--gold:#D4B06A;--bg:#f4f6f8}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:Arial,sans-serif}.header{background:var(--navy);padding:18px;border-radius:0 0 20px 20px}.logo{text-align:center}.logo img{height:90px;max-width:100%}.toolbar{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;align-items:center;margin-top:10px}.btn{background:transparent;color:var(--gold);border:1px solid var(--gold);border-radius:12px;padding:8px}.center{text-align:center;color:var(--gold)}.card{background:#fff;margin:12px;border-radius:16px;padding:12px;box-shadow:0 2px 10px rgba(0,0,0,.08)}.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}.head{text-align:center;font-weight:bold;padding:8px}.day{min-height:60px;border:1px solid #ddd;border-radius:10px;padding:4px;text-align:center;cursor:pointer}.work{background:#eaf8ea}.weekend{background:#d9f6d9}.nat{background:#ffdede}.local{background:#dcedff}.vac{background:#ecd8ff}.modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center}.modalbox{background:#fff;width:320px;padding:16px;border-radius:16px}.modalbox button{width:100%;padding:12px;margin:4px 0}.hidden{display:none}.months{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.mini{background:#fff;padding:12px;border-radius:14px;box-shadow:0 2px 8px rgba(0,0,0,.08)}.gold{color:var(--gold);font-weight:bold;font-size:26px}@media(max-width:900px){.months{grid-template-columns:1fr}}</style></head><body>
<div id="main">
<div class="header"><div class="logo"><img src="logo.png" alt="Logo"></div><div class="toolbar"><div></div><div class="center"><button class="btn" onclick="chgY(-1)">◀</button> <span id="year"></span> <button class="btn" onclick="chgY(1)">▶</button></div><div></div><div class="center"><button class="btn" onclick="chgM(-1)">◀</button> <span id="month"></span> <button class="btn" onclick="chgM(1)">▶</button></div><div></div><div><button class="btn" onclick="config()">⚙️ Config</button></div><div><button class="btn" onclick="showSummary()">📊 Resumen</button></div></div></div>
<div class="card"><div id="calendar" class="cal"></div></div><div class="card"><div id="resume"></div></div></div>
<div id="summary" class="hidden"><div class="header"><button class="btn" onclick="back()">← Volver al calendario</button></div><div class="card"><div id="months" class="months"></div></div><div class="card"><h2>Resumen anual</h2><div id="annual"></div><br><button class="btn" onclick="window.print()">📄 Exportar PDF A4</button></div></div>
<div id="modal" class="modal"><div class="modalbox"><h3 id="selDate"></h3><button onclick="actionDay('work')">✅ Trabajo</button><button onclick="actionDay('local')">🟦 Festivo local</button><button onclick="actionDay('vac')">🏖 Vacaciones</button><button onclick="actionDay('clear')">❌ Borrar</button><button onclick="closeModal()">Cancelar</button></div></div>
<script>
let db=JSON.parse(localStorage.getItem('ccg61')||'{"work":{},"vac":{},"local":{},"cfg":{"d":35,"p":100},"y":2026,"m":0}');let y=db.y,m=db.m,current='';
function save(){db.y=y;db.m=m;localStorage.setItem('ccg61',JSON.stringify(db));}
function chgY(n){y+=n;draw()} function chgM(n){m+=n;if(m<0){m=11;y--}if(m>11){m=0;y++}draw()}
function config(){let d=prompt('Dieta diaria',db.cfg.d);let p=prompt('Plus fin semana/festivo',db.cfg.p);if(d)db.cfg.d=+d;if(p)db.cfg.p=+p;save();draw();}
function openModal(k){current=k;selDate.innerText=k;modal.style.display='flex'} function closeModal(){modal.style.display='none'}
function actionDay(a){if(a==='work'){db.work[current]=1;delete db.vac[current]}if(a==='local'){db.local[current]=1}if(a==='vac'){db.vac[current]=1;delete db.work[current]}if(a==='clear'){delete db.work[current];delete db.vac[current];delete db.local[current]}save();closeModal();draw()}
function draw(){year.textContent=y;month.textContent=new Date(y,m,1).toLocaleString('es',{month:'long'}).toUpperCase();calendar.innerHTML='';['L','M','X','J','V','S','D'].forEach(d=>calendar.innerHTML+=`<div class=head>${d}</div>`);let off=(new Date(y,m,1).getDay()+6)%7;for(let i=0;i<off;i++)calendar.innerHTML+='<div></div>';let L=0,W=0,F=0,V=0,di=0,pl=0;for(let d=1;d<=new Date(y,m+1,0).getDate();d++){let k=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;let wd=new Date(y,m,d).getDay();let c='day',t=d;if(db.vac[k]){c+=' vac';V++;t+=' 🏖'}else if(db.work[k]){di+=db.cfg.d;if(db.local[k]){c+=' local';F++;pl+=db.cfg.p;t+=' ✅✅'}else if(wd==0||wd==6){c+=' weekend';W++;pl+=db.cfg.p;t+=' ✅✅'}else{c+=' work';L++;t+=' ✅'}}else if(db.local[k]){c+=' local';t+=' 🎉'}calendar.innerHTML+=`<div class="${c}" onclick="openModal('${k}')">${t}</div>`}resume.innerHTML=`Laborables: ${L}<br>Fin de semana: ${W}<br>Festivos locales: ${F}<br>Vacaciones: ${V}<hr>Dietas: ${di} €<br>Plus: ${pl} €<br><div class='gold'>${di+pl} €</div>`;save();}
function showSummary(){main.classList.add('hidden');summary.classList.remove('hidden');renderSummary()}
function back(){summary.classList.add('hidden');main.classList.remove('hidden')}
function renderSummary(){let out='',AL=0,AW=0,AF=0,AV=0,AD=0,AP=0;for(let mm=0;mm<12;mm++){let L=0,W=0,F=0,V=0,D=0,P=0;for(let d=1;d<=31;d++){let k=`${y}-${String(mm+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;let wd=new Date(y,mm,d).getDay();if(db.vac[k])V++;else if(db.work[k]){D+=db.cfg.d;if(db.local[k]){F++;P+=db.cfg.p}else if(wd==0||wd==6){W++;P+=db.cfg.p}else L++;}}AL+=L;AW+=W;AF+=F;AV+=V;AD+=D;AP+=P;out+=`<div class='mini'><b>${new Date(y,mm,1).toLocaleString('es',{month:'long'}).toUpperCase()}</b><hr>Lab ${L}<br>FDS ${W}<br>Fest ${F}<br>Vac ${V}<hr><div class='gold'>${D+P} €</div></div>`;}months.innerHTML=out;annual.innerHTML=`Laborables: ${AL}<br>Fin semana: ${AW}<br>Festivos locales: ${AF}<br>Vacaciones: ${AV}<hr>Dietas: ${AD} €<br>Plus: ${AP} €<hr><div class='gold'>${AD+AP} €</div>`}
draw();
</script></body></html>
